<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library Log</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.18);
      --text: #1a1a18;
      --text-muted: #6b6b67;
      --text-faint: #9a9a96;
      --accent: #2563eb;
      --accent-bg: #eff6ff;
      --radius-md: 8px;
      --radius-lg: 14px;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #18181a;
        --surface: #232325;
        --border: rgba(255,255,255,0.09);
        --border-strong: rgba(255,255,255,0.16);
        --text: #f0efe9;
        --text-muted: #a0a09c;
        --text-faint: #666662;
        --accent: #60a5fa;
        --accent-bg: #1e3a5f;
        --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    header p {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1.25rem;
      letter-spacing: -0.01em;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input, select {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }

    input::placeholder { color: var(--text-faint); }

    .submit-btn {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-radius: var(--radius-md);
      background: var(--accent);
      border: none;
      color: #fff;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
    }

    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:active { transform: scale(0.99); }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 10px;
    }

    .count-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--bg);
      color: var(--text-muted);
      border: 1px solid var(--border);
      font-weight: 500;
    }

    .export-row {
      display: flex;
      gap: 8px;
    }

    .export-btn {
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    .export-btn:hover { opacity: 0.78; }
    .btn-sheets { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }

    @media (prefers-color-scheme: dark) {
      .btn-sheets { background: #14532d; color: #6ee7b7; border-color: #166534; }
    }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      font-size: 13px;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0 10px 10px;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }

    .status-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }

    .status-pending    { background: #fef3c7; color: #92400e; }
    .status-inprogress { background: #dbeafe; color: #1e40af; }
    .status-completed  { background: #d1fae5; color: #065f46; }
    .status-cancelled  { background: #fee2e2; color: #991b1b; }

    @media (prefers-color-scheme: dark) {
      .status-pending    { background: #78350f; color: #fcd34d; }
      .status-inprogress { background: #1e3a5f; color: #93c5fd; }
      .status-completed  { background: #14532d; color: #6ee7b7; }
      .status-cancelled  { background: #7f1d1d; color: #fca5a5; }
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--text-faint);
      cursor: pointer;
      font-size: 15px;
      padding: 2px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: background 0.12s, color 0.12s;
    }

    .delete-btn:hover {
      background: #fee2e2;
      color: #991b1b;
    }

    .empty {
      text-align: center;
      padding: 2.5rem;
      color: var(--text-faint);
      font-size: 13px;
    }

    @media (max-width: 560px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .log-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Library Log</h1>
      <p>Track member assignments — entries save directly to Google Sheets</p>
    </header>

    <div class="card">
      <div class="card-title">New entry</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="f-date" />
        </div>
        <div class="form-group">
          <label>Member name</label>
          <input type="text" id="f-member" placeholder="e.g. Jordan Lee" />
        </div>
        <div class="form-group full">
          <label>3D Print title</label>
          <input type="text" id="f-title" placeholder="e.g. Custom bracket v2" />
        </div>
        <div class="form-group full">
          <label>Status</label>
          <select id="f-status">
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>
        <div class="form-group full">
          <button class="submit-btn" onclick="addEntry()">Add to log + save to Google Sheets</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="log-header">
        <div class="card-title" style="margin-bottom:0;">Assignment log <span class="count-badge" id="count-badge">0 entries</span></div>
        <div class="export-row">
          <a href="https://docs.google.com/spreadsheets/d/1PUgXfy_X5ifuDIpQ2fu1iozh3az-AoqKr6LN506qWKM/edit" target="_blank" class="export-btn btn-sheets" style="text-decoration:none;">View Google Sheet ↗</a>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Member</th>
              <th>3D Print title</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="log-body">
            <tr><td colspan="5" class="empty">No entries yet — add your first assignment above.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby8vLa6_VxGNpw46ty2lsxZExNbDSr1ZJyHzK_h4kTukRbO87oubhB75DyHvJXgtR_cjA/exec";
    let entries = [];

    function todayStr() {
      return new Date().toISOString().split('T')[0];
    }
    document.getElementById('f-date').value = todayStr();

    async function loadEntries() {
      const tbody = document.getElementById('log-body');
      tbody.innerHTML = '<tr><td colspan="5" class="empty">Loading entries…</td></tr>';
      try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        entries = data.map(e => ({ ...e, saved: true }));
        render();
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">Could not load entries — check your connection.</td></tr>';
      }
    }

    loadEntries();

    function statusClass(s) {
      if (s === 'Pending') return 'status-pending';
      if (s === 'In Progress') return 'status-inprogress';
      if (s === 'Completed') return 'status-completed';
      if (s === 'Cancelled') return 'status-cancelled';
      return '';
    }

    function render() {
      const tbody = document.getElementById('log-body');
      const badge = document.getElementById('count-badge');
      badge.textContent = entries.length + (entries.length === 1 ? ' entry' : ' entries');
      if (entries.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">No entries yet — add your first assignment above.</td></tr>';
        return;
      }
      tbody.innerHTML = [...entries].reverse().map((e, ri) => {
        const i = entries.length - 1 - ri;
        const saving = e.saving ? ' <span style="font-size:11px;color:var(--text-faint);">saving…</span>' : '';
        const saved = e.saved ? ' <span style="font-size:11px;color:#065f46;">✓ saved</span>' : '';
        const err = e.error ? ` <span style="font-size:11px;color:#991b1b;">⚠ ${e.error}</span>` : '';
        return `<tr>
          <td>${e.date}</td>
          <td>${e.member}</td>
          <td>${e.title}${saving}${saved}${err}</td>
          <td><span class="status-pill ${statusClass(e.status)}">${e.status}</span></td>
          <td><button class="delete-btn" onclick="deleteEntry(${i})" title="Remove">✕</button></td>
        </tr>`;
      }).join('');
    }

    async function addEntry() {
      const date = document.getElementById('f-date').value;
      const member = document.getElementById('f-member').value.trim();
      const title = document.getElementById('f-title').value.trim();
      const status = document.getElementById('f-status').value;
      if (!date || !member || !title) {
        alert('Please fill in date, member name, and print title.');
        return;
      }

      const entry = { date, member, title, status, saving: true, saved: false, error: null };
      entries.push(entry);
      document.getElementById('f-member').value = '';
      document.getElementById('f-title').value = '';
      document.getElementById('f-date').value = todayStr();
      document.getElementById('f-status').value = 'Pending';
      render();

      try {
        const formData = new FormData();
        formData.append('date', date);
        formData.append('member', member);
        formData.append('title', title);
        formData.append('status', status);

        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: formData,
        });
        entry.saving = false;
        entry.saved = true;
      } catch (err) {
        console.error('Fetch error:', err);
        entry.saving = false;
        entry.error = err.message || 'Network error';
      }
      render();
    }

    function deleteEntry(i) {
      entries.splice(i, 1);
      render();
    }
  </script>
</body>
</html>
